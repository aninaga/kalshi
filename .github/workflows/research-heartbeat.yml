# Autonomous research heartbeat — fires ONE analyst pass on a cadence.
#
# This is the "scheduled" half of Meaning A (run the falsification factory
# unattended). It runs `python -m research.lab.heartbeat --once`, which:
#   * originates ideas (scout), prioritizes them (director), works up to
#     --max-ideas to a verdict (analyst), and appends each trial to the shared
#     ledger so governance's Deflated-Sharpe N stays honest;
#   * is budget-aware and persists state in research/reports/alpha/, so a
#     verdict that survives the gate surfaces as a PROMOTE candidate for HUMAN
#     review — capital deployment and the test-split burn stay human-gated.
#
# SAFE BY DEFAULT: the schedule is OPT-IN. The job only runs when the repo
# variable RESEARCH_HEARTBEAT_ENABLED == 'true' (Settings -> Variables), so
# merging this workflow never silently starts spawning agents. Without a live
# agent on the runner (no `codex` / API creds) a pass simply no-ops (processed=0)
# and exits 0 — nothing is fabricated.
name: research-heartbeat

on:
  workflow_dispatch:
    inputs:
      max_ideas:
        description: "Max ideas to work this pass"
        default: "3"
      market:
        description: "Restrict to one market (winner|total|spread), or blank"
        default: ""
      dry_run:
        description: "Dry run (no agent spawn)"
        type: boolean
        default: false
  # Opt-in cadence. Enable by setting repo variable RESEARCH_HEARTBEAT_ENABLED=true.
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours

permissions:
  contents: write           # to commit the updated ledger / state back

concurrency:
  group: research-heartbeat
  cancel-in-progress: false  # never interrupt a pass mid-flight

jobs:
  heartbeat:
    # workflow_dispatch always runs; the schedule only runs when opted in.
    if: ${{ github.event_name == 'workflow_dispatch' || vars.RESEARCH_HEARTBEAT_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install numpy pandas

      - name: Run one heartbeat pass
        run: |
          python -m research.lab.heartbeat --once \
            --max-ideas "${{ github.event.inputs.max_ideas || '3' }}" \
            ${{ github.event.inputs.market && format('--market {0}', github.event.inputs.market) || '' }} \
            ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}

      - name: Commit ledger / state if changed
        run: |
          git config user.name "research-heartbeat"
          git config user.email "noreply@github.com"
          git add research/reports/alpha/ledger.jsonl \
                  research/reports/alpha/heartbeat_state.json \
                  research/reports/alpha/hypotheses.jsonl 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "research-heartbeat: record autonomous pass"
            git push
          else
            echo "no ledger/state changes to commit"
          fi
