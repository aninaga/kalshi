name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package (editable, with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Byte-compile (syntax check)
        run: python -m compileall kalshi_arbitrage
      - name: CLI wires up (console script importable)
        run: kalshi-arb --help
      - name: Run arbitrage-bot tests
        run: pytest tests/ -q
