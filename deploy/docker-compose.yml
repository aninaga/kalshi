# 24/7 SHADOW monitor (no capital). Stand up with:
#   docker compose -f deploy/docker-compose.yml up --build -d
services:
  shadow:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file: ../.env
    environment:
      EXECUTION_MODE: paper          # never 'live' for shadow
    restart: unless-stopped          # restart-on-crash
    volumes:
      # Ledger + capture persist on the host (durable across container restarts).
      - ../market_data:/opt/kalshi/market_data
    logging:
      driver: json-file
      options:
        max-size: "10m"              # built-in log rotation
        max-file: "5"
    command:
      - monitor
      - --allowlist
      - market_data/matching/match_allowlist.json
      - --ledger
      - market_data/shadow/ledger.jsonl
      - --interval
      - "20"
